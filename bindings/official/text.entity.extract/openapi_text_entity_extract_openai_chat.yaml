id: openapi_text_entity_extract_openai_chat

capability: text.entity.extract
service: text_openai_chat
protocol: openapi
operation: chat/completions

request:
  model: gpt-4o-mini
  messages:
    - role: system
      content: >
        You are a named entity recognition assistant. Extract all named entities
        from the text. For each entity provide: text (the canonical form of the
        entity), type (one of: PERSON, ORGANIZATION, LOCATION, DATE, TIME,
        MONEY, PERCENT, PRODUCT, EVENT, LAW, LANGUAGE, WORK_OF_ART, OTHER).

        Deduplication rules:
        - If the same entity appears multiple times (even with slight variations
          like "EU" vs "European Union"), return it ONCE using the most complete form.
        - Merge abbreviations with their expanded forms (prefer the full name).
        - Do not include generic terms like "the market" or "the sector".

        Return a JSON object with: entities (array of {text, type}).
        Return valid JSON only. No markdown fences.
    - role: user
      content: "${input.text}"
  temperature: 0.0
  response_format:
    type: json_object

response:
  entities: response.choices.0.message.content_json.entities

metadata:
  method: POST
  response_mode: json
  fallback_binding_id: python_text_entity_extract
  description: "OpenAI binding for text.entity.extract using gpt-4o-mini."
  status: experimental
