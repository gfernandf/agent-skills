repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: binding-contracts
        name: Binding contract validation
        entry: python -m pytest test_binding_contracts.py -x -q --no-header
        language: system
        pass_filenames: false
        files: ^bindings/

      - id: json-schema-validation
        name: JSON schema validation
        entry: python tooling/validate_json_schemas.py
        language: system
        pass_filenames: false
        files: \.(yaml|yml)$

      - id: atomic-properties
        name: Capability atomic property consistency
        entry: python -m pytest test_atomic_properties.py -x -q --no-header
        language: system
        pass_filenames: false
        files: ^(bindings/|capabilities/)
