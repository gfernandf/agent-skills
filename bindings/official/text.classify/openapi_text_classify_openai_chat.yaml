id: openapi_text_classify_openai_chat

capability: text.classify
service: text_openai_chat
protocol: openapi
operation: chat/completions

request:
  model: gpt-4o-mini
  messages:
    - role: system
      content: >
        You are a text classification assistant. Classify the given text into the
        most appropriate category. If candidate labels are provided, you must choose
        from them. If no labels are provided, assign a descriptive category.
        Return a JSON object with: label (string), confidence (number 0.0-1.0).
        Return valid JSON only. No markdown fences.
    - role: user
      content: |
        Text: ${input.text}
  temperature: 0.1
  response_format:
    type: json_object

response:
  label: response.choices.0.message.content_json.label
  confidence: response.choices.0.message.content_json.confidence

metadata:
  method: POST
  response_mode: json
  fallback_binding_id: python_text_classify
  description: "OpenAI binding for text.classify using gpt-4o-mini."
  status: experimental
