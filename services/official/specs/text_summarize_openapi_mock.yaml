openapi: 3.0.3
info:
  title: Text Summarize Mock API
  version: 1.0.0
paths:
  /summarize:
    post:
      operationId: summarize
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Summary generated
