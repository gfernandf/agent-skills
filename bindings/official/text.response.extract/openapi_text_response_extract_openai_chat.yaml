id: openapi_text_response_extract_openai_chat
capability: text.response.extract
service: text_openai_chat
protocol: openapi
operation: chat/completions

request:
  model: gpt-4o-mini
  messages:
    - role: system
      content: >
        You are a question-answering assistant. Answer the question using
        ONLY information present in the provided context. If the context
        does not contain enough information, say so honestly.
        Return a JSON object with: answer (string), confidence (number 0.0-1.0).
        Return valid JSON only. No markdown fences.
    - role: user
      content: |
        Context: ${input.context}
        Question: ${input.question}
  temperature: 0.1
  response_format:
    type: json_object

response:
  answer: response.choices.0.message.content_json.answer
  confidence: response.choices.0.message.content_json.confidence

metadata:
  method: POST
  response_mode: json
  fallback_binding_id: python_text_response_extract
  description: OpenAI binding for text.response.extract using gpt-4o-mini.
  status: experimental
