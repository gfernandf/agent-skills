name: Smoke Verification

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests beautifulsoup4 PyPDF2

      - name: Run smoke verifier
        run: |
          python tooling/verify_smoke_capabilities.py --report-file artifacts/smoke_report.json

      - name: Publish smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: artifacts/smoke_report.json

      - name: Append smoke summary
        if: always()
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          report_path = Path('artifacts/smoke_report.json')
          if not report_path.exists():
              summary = "## Smoke Verification\n\nNo report file generated.\n"
          else:
              report = json.loads(report_path.read_text(encoding='utf-8'))
              summary = [
                  "## Smoke Verification",
                  "",
                  f"- Total: {report.get('total', 0)}",
                  f"- Passed: {report.get('passed', 0)}",
                  f"- Failed: {report.get('failed', 0)}",
                  "",
              ]
              failures = report.get('failures', [])
              if failures:
                  summary.append("### Failures")
                  for item in failures:
                      summary.append(f"- {item.get('capability')}: {item.get('reason')}")
              else:
                  summary.append("All smoke capabilities passed.")
              summary = "\n".join(summary) + "\n"

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write(summary)
          PY
