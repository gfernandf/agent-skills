# ─────────────────────────────────────────────────────────
# Example: Simple single-step skill
# ─────────────────────────────────────────────────────────
# This skill takes a prompt and generates text using the
# text.content.generate capability.

id: example.text.generate
version: "1.0.0"
name: Simple Text Generator
description: Generate text from a prompt using an LLM.

inputs:
  prompt:
    type: string
    description: The text generation prompt
    required: true
  max_tokens:
    type: integer
    description: Maximum tokens to generate
    default: 256

outputs:
  generated_text:
    type: string
    description: The generated text

steps:
  - id: generate
    uses: text.content.generate
    input_mapping:
      prompt: "inputs.prompt"
      max_tokens: "inputs.max_tokens"
    output_mapping:
      generated_text: "outputs.generated_text"
