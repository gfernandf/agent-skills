name: Smoke Verification

on:
  push:
    branches:
      - master
      - main
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      run_full_batch:
        description: "Run full capability batch verification"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  # Pinned registry ref for deterministic cross-repo smoke runs.
  # Update intentionally when advancing the runtime/registry compatibility baseline.
  REGISTRY_REF: f89c7f4
  # Operational guardrail: fail if the pin drifts too far behind origin/main.
  MAX_PIN_DRIFT_COMMITS: 25

jobs:
  pin_drift_guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry
          git -C ../agent-skill-registry fetch origin main --quiet
          git -C ../agent-skill-registry rev-parse --verify "${REGISTRY_REF}^{commit}" >/dev/null

      - name: Enforce registry pin drift budget
        run: |
          DRIFT=$(git -C ../agent-skill-registry rev-list --count "${REGISTRY_REF}..origin/main")
          echo "Pinned registry drift commits: ${DRIFT}"
          if [ "${DRIFT}" -gt "${MAX_PIN_DRIFT_COMMITS}" ]; then
            echo "REGISTRY_REF drift (${DRIFT}) exceeds MAX_PIN_DRIFT_COMMITS (${MAX_PIN_DRIFT_COMMITS})." >&2
            echo "Update REGISTRY_REF after validating runtime/registry compatibility." >&2
            exit 1
          fi

  smoke:
    needs: pin_drift_guard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry
          git -C ../agent-skill-registry checkout "${REGISTRY_REF}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run smoke verifier
        run: |
          python tooling/verify_smoke_capabilities.py --report-file artifacts/smoke_report.json

      - name: Run customer-facing smoke checks
        run: |
          mkdir -p artifacts
          python tooling/verify_customer_http_controls.py | tee artifacts/customer_http_controls.log
          python tooling/verify_customer_facing_parity_snapshot.py | tee artifacts/customer_parity_snapshot.log
          python tooling/verify_mcp_text_summarize.py | tee artifacts/mcp_text_summarize.log
          python tooling/verify_mcp_data_web_slices.py | tee artifacts/mcp_data_web_slices.log

      - name: Build attach target index and run gateway smoke
        run: |
          python tooling/build_attach_target_index.py --runtime-root . | tee artifacts/attach_target_index.log
          python tooling/smoke_gateway_slice3.py --runtime-root . --registry-root ../agent-skill-registry --host-root . | tee artifacts/gateway_slice3.log

      - name: Publish smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: |
            artifacts/smoke_report.json
            artifacts/customer_http_controls.log
            artifacts/customer_parity_snapshot.log
            artifacts/mcp_text_summarize.log
            artifacts/mcp_data_web_slices.log
            artifacts/attach_target_index.log
            artifacts/gateway_slice3.log
            artifacts/attach_targets/index.json
            tooling/snapshots/consumer_facing_parity_v1.actual.json

      - name: Append smoke summary
        if: always()
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          report_path = Path('artifacts/smoke_report.json')
          if not report_path.exists():
              summary = "## Smoke Verification\n\nNo report file generated.\n"
          else:
              report = json.loads(report_path.read_text(encoding='utf-8'))
              summary = [
                  "## Smoke Verification",
                  "",
                  f"- Total: {report.get('total', 0)}",
                  f"- Passed: {report.get('passed', 0)}",
                  f"- Failed: {report.get('failed', 0)}",
                  "",
              ]
              failures = report.get('failures', [])
              if failures:
                  summary.append("### Failures")
                  for item in failures:
                      summary.append(f"- {item.get('capability')}: {item.get('reason')}")
              else:
                  summary.append("All smoke capabilities passed.")
              summary = "\n".join(summary) + "\n"

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write(summary)
          PY

      - name: Append customer-facing smoke summary
        if: always()
        run: |
          python - << 'PY'
          from pathlib import Path

          checks = [
              (Path('artifacts/customer_http_controls.log'), 'Customer-facing HTTP controls verification passed.'),
              (Path('artifacts/customer_parity_snapshot.log'), 'Customer-facing parity snapshot verification passed.'),
              (Path('artifacts/mcp_text_summarize.log'), 'MCP text.content.summarize verification passed.'),
              (Path('artifacts/mcp_data_web_slices.log'), 'MCP data/web slice verification passed.'),
              (Path('artifacts/gateway_slice3.log'), '[smoke] slice3 PASSED'),
          ]

          lines = ['## Customer-Facing Smoke Checks', '']
          for log_path, expected in checks:
              if not log_path.exists():
                  lines.append(f'- {log_path.name}: missing log')
                  continue
              content = log_path.read_text(encoding='utf-8', errors='replace')
              status = 'passed' if expected in content else 'failed'
              lines.append(f'- {log_path.name}: {status}')

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')
          PY

  contracts:
    needs: pin_drift_guard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry
          git -C ../agent-skill-registry checkout "${REGISTRY_REF}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run contract tests
        run: |
          mkdir -p artifacts
          python tooling/test_capability_contracts.py | tee artifacts/contracts.log

      - name: Publish contracts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-report
          path: artifacts/contracts.log

      - name: Append contracts summary
        if: always()
        run: |
          python - << 'PY'
          from pathlib import Path

          log_path = Path('artifacts/contracts.log')
          if not log_path.exists():
              summary = "## Contract Tests\n\nNo contract log generated.\n"
          else:
              lines = log_path.read_text(encoding='utf-8', errors='replace').splitlines()
              summary_line = next((line for line in lines if line.startswith('SUMMARY:')), None)
              summary = "## Contract Tests\n\n"
              if summary_line:
                  summary += f"- {summary_line}\n"
              else:
                  summary += "- Summary line not found in log.\n"

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write(summary)
          PY

  registry_consistency:
    needs: pin_drift_guard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry
          git -C ../agent-skill-registry checkout "${REGISTRY_REF}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Validate registry
        run: |
          cd ../agent-skill-registry
          python tools/validate_registry.py

      - name: Regenerate registry catalog and stats
        run: |
          cd ../agent-skill-registry
          python tools/generate_catalog.py
          python tools/registry_stats.py

      - name: Verify catalog freshness
        run: |
          git -C ../agent-skill-registry status --porcelain
          if [ -n "$(git -C ../agent-skill-registry status --porcelain)" ]; then
            echo "Registry catalog/stats are out of date. Please regenerate and commit changes." >&2
            git -C ../agent-skill-registry --no-pager diff
            exit 1
          fi

      - name: Append registry consistency summary
        if: always()
        run: |
          python - << 'PY'
          import subprocess
          from pathlib import Path

          cp = subprocess.run(
            ["git", "-C", "../agent-skill-registry", "status", "--porcelain"],
            check=False,
            text=True,
            capture_output=True,
          )
          has_diffs = bool((cp.stdout or "").strip())
          freshness = "pending diffs detected" if has_diffs else "no pending diffs"
          summary = (
            "## Registry Consistency\n\n"
            "- Validation: completed\n"
            f"- Catalog freshness: {freshness}\n"
          )
          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write(summary)
          PY

  openapi_verification:
    needs: pin_drift_guard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry
          git -C ../agent-skill-registry checkout "${REGISTRY_REF}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run OpenAPI verifications
        run: |
          mkdir -p artifacts
          python cli/main.py openapi verify-bindings --all --report-file artifacts/openapi_bindings_report.json
          python cli/main.py openapi verify-invoker | tee artifacts/openapi_invoker.log
          python cli/main.py openapi verify-errors | tee artifacts/openapi_errors.log

      - name: Publish OpenAPI verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-verification-report
          path: |
            artifacts/openapi_bindings_report.json
            artifacts/openapi_invoker.log
            artifacts/openapi_errors.log

      - name: Append OpenAPI summary
        if: always()
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          report_path = Path('artifacts/openapi_bindings_report.json')
          summary = [
              "## OpenAPI Verification",
              "",
          ]

          if report_path.exists():
              report = json.loads(report_path.read_text(encoding='utf-8'))
              summary.extend([
                  f"- Scenarios total: {report.get('total', 0)}",
                  f"- Scenarios passed: {report.get('passed', 0)}",
                  f"- Scenarios failed: {report.get('failed', 0)}",
              ])
          else:
              summary.append("- Scenario report file not generated.")

          invoker_log = Path('artifacts/openapi_invoker.log')
          errors_log = Path('artifacts/openapi_errors.log')
          summary.append(f"- Invoker log present: {'yes' if invoker_log.exists() else 'no'}")
          summary.append(f"- Error contract log present: {'yes' if errors_log.exists() else 'no'}")
          summary.append("")

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write("\n".join(summary) + "\n")
          PY

  runtime_canary:
    needs: pin_drift_guard
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry
          git -C ../agent-skill-registry checkout "${REGISTRY_REF}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run runtime canary checks
        run: |
          mkdir -p artifacts
          python tooling/verify_binding_fallback_policy.py | tee artifacts/binding_fallback.log
          python tooling/verify_binding_conformance_suite.py | tee artifacts/binding_conformance_suite.log
          python tooling/verify_customer_facing_neutral.py | tee artifacts/customer_facing_neutral.log
          python tooling/compute_runtime_coverage.py > artifacts/runtime_coverage.json
          python tooling/compute_skill_executability.py > artifacts/skill_executability.json

      - name: Enforce coverage and executability ratios
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          coverage = json.loads(Path('artifacts/runtime_coverage.json').read_text(encoding='utf-8'))
          skills = json.loads(Path('artifacts/skill_executability.json').read_text(encoding='utf-8'))

          coverage_ratio = float(coverage.get('coverage_ratio', 0.0) or 0.0)
          executability_ratio = float(skills.get('executability_ratio', 0.0) or 0.0)

          if coverage_ratio < 1.0:
              raise SystemExit(f"Coverage ratio below 1.0: {coverage_ratio}")
          if executability_ratio < 1.0:
              raise SystemExit(f"Skill executability ratio below 1.0: {executability_ratio}")
          PY

      - name: Publish runtime canary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-canary-report
          path: |
            artifacts/binding_fallback.log
            artifacts/binding_conformance_suite.log
            artifacts/customer_facing_neutral.log
            artifacts/runtime_coverage.json
            artifacts/skill_executability.json

      - name: Append runtime canary summary
        if: always()
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          lines = ['## Runtime Canary', '']

          coverage_path = Path('artifacts/runtime_coverage.json')
          skills_path = Path('artifacts/skill_executability.json')

          if coverage_path.exists():
              coverage = json.loads(coverage_path.read_text(encoding='utf-8'))
              lines.append(f"- Coverage ratio: {coverage.get('coverage_ratio', 'n/a')}")
          else:
              lines.append('- Coverage ratio: report missing')

          if skills_path.exists():
              skills = json.loads(skills_path.read_text(encoding='utf-8'))
              lines.append(f"- Skill executability ratio: {skills.get('executability_ratio', 'n/a')}")
          else:
              lines.append('- Skill executability ratio: report missing')

          for log_name in [
              'binding_fallback.log',
              'binding_conformance_suite.log',
              'customer_facing_neutral.log',
          ]:
              log_path = Path('artifacts') / log_name
              lines.append(f"- {log_name}: {'present' if log_path.exists() else 'missing'}")

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')
          PY

  full_batch:
    needs: pin_drift_guard
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full_batch == true) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry
          git -C ../agent-skill-registry checkout "${REGISTRY_REF}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run full capability batch
        run: |
          mkdir -p artifacts
          python test_capabilities_batch.py | tee artifacts/full_batch.log

      - name: Publish full-batch artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-batch-log
          path: artifacts/full_batch.log

      - name: Append full-batch summary
        if: always()
        run: |
          python - << 'PY'
          from pathlib import Path

          log_path = Path('artifacts/full_batch.log')
          if not log_path.exists():
              summary = "## Full Batch Verification\n\nNo full batch log generated.\n"
          else:
              lines = log_path.read_text(encoding='utf-8', errors='replace').splitlines()
              summary_line = next((line for line in lines if line.startswith('SUMMARY:')), None)
              summary = "## Full Batch Verification\n\n"
              if summary_line:
                  summary += f"- {summary_line}\n"
              else:
                  summary += "- Summary line not found in log.\n"

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as f:
              f.write(summary)
          PY
