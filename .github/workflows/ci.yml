name: CI — Test · Lint · Type-check · Security

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy hypothesis mutmut jsonschema

      - name: Run unit tests with coverage
        run: |
          python -m pytest --tb=short -q -o "addopts=--cov=runtime --cov=gateway --cov=customer_facing --cov=customization --cov-report=term-missing:skip-covered --cov-report=html:artifacts/htmlcov" 2>&1 | tee artifacts/pytest.log
        env:
          PYTHONPATH: .

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: artifacts/htmlcov/

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check --output-format=github .

      - name: Ruff format check
        run: ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy types-PyYAML types-requests

      - name: Run mypy
        run: |
          mypy runtime/ gateway/ customer_facing/ \
            --ignore-missing-imports \
            --no-error-summary \
            --show-error-codes \
            2>&1 | tee artifacts/mypy.log || true

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: pip-audit
        run: |
          pip-audit --format=json --output=artifacts/pip_audit.json || true

      - name: SBOM generation
        run: |
          python tooling/security_audit.py --sbom-only --output artifacts/sbom.json || true

      - name: JSON schema validation
        run: |
          pip install jsonschema
          python tooling/validate_json_schemas.py || true

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            artifacts/pip_audit.json
            artifacts/sbom.json

  container-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-skills:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "agent-skills:ci"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          output: "artifacts/trivy-report.txt"

      - name: Run Trivy SBOM
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        with:
          image-ref: "agent-skills:ci"
          format: "cyclonedx"
          output: "artifacts/trivy-sbom.json"

      - name: Upload container security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-reports
          path: |
            artifacts/trivy-report.txt
            artifacts/trivy-sbom.json

  binding-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Checkout agent-skill-registry
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/agent-skill-registry.git" ../agent-skill-registry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run binding contract tests
        run: |
          python -m pytest test_binding_contracts.py test_atomic_properties.py -v --tb=short

      - name: Run protocol equivalence tests
        run: |
          python -m pytest test_protocol_equivalence.py -v --tb=short
