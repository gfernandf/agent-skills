id: openapi_model_output_classify_openai_chat
capability: model.output.classify
service: model_openai_chat
protocol: openapi
operation: chat/completions

request:
  model: gpt-4o-mini
  messages:
    - role: system
      content: >
        You are an output classification assistant.
        You receive a model-generated output and a list of candidate categories.
        Classify the output into exactly one category.
        Return a JSON object with: category (string, must be one of the candidates),
        confidence (number 0.0-1.0), rationale (string explaining the choice).
        Return valid JSON only. No markdown fences.
    - role: user
      content: |
        Output to classify:
        ${input.output}

        Categories: ${input.categories}

        Context: ${input.context}
  temperature: 0.1
  response_format:
    type: json_object

response:
  category: response.choices.0.message.content_json.category
  confidence: response.choices.0.message.content_json.confidence
  rationale: response.choices.0.message.content_json.rationale

metadata:
  method: POST
  response_mode: json
  fallback_binding_id: python_model_output_classify
  description: "OpenAI binding for model.output.classify using gpt-4o-mini."
  status: experimental
